<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --indigo:#6366f1;--purple:#c084fc;--pink:#f472b6;
  --safe-top:env(safe-area-inset-top,0px);
  --safe-bottom:env(safe-area-inset-bottom,0px);
}
html,body{height:100%;background:#f8f7ff;font-family:'Nunito',sans-serif;overflow:hidden}
#root{height:100%;display:flex;flex-direction:column}

/* Screens */
.screen{position:fixed;inset:0;display:flex;flex-direction:column;overflow:hidden;background:#f8f7ff;transition:transform .3s ease,opacity .3s ease}
.screen.hidden{transform:translateX(110%);pointer-events:none}

/* Gradient */
.gradient{background:linear-gradient(160deg,#667eea,#c084fc,#f472b6);min-height:100%}

/* Scrollable body */
.scroll-body{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:16px;padding-bottom:calc(var(--safe-bottom) + 32px)}

/* Cards */
.card{background:#fff;border-radius:20px;padding:16px;margin-bottom:12px;box-shadow:0 2px 8px rgba(0,0,0,.06)}

/* Buttons */
.btn{display:flex;align-items:center;justify-content:center;border:none;border-radius:14px;padding:14px;font-family:'Nunito',sans-serif;font-weight:800;font-size:16px;cursor:pointer;width:100%}
.btn-primary{background:var(--indigo);color:#fff}
.btn-danger{background:#ef4444;color:#fff}
.btn-success{background:#10b981;color:#fff}
.btn-ghost{background:rgba(255,255,255,.2);color:#fff;border:2px solid rgba(255,255,255,.4)}

/* Input */
.input{width:100%;border:2px solid #e5e7eb;border-radius:12px;padding:12px;font-family:'Nunito',sans-serif;font-size:15px;color:#111;background:#fff;outline:none}
.input:focus{border-color:var(--indigo)}

/* Label */
.label{font-weight:700;font-size:14px;color:#374151;margin-bottom:6px;margin-top:12px;display:block}

/* Header bar */
.header{background:#fff;border-bottom:1px solid #e5e7eb;padding:14px 16px;display:flex;align-items:center;gap:12px;padding-top:calc(var(--safe-top) + 14px)}
.header-title{font-weight:900;font-size:20px;color:#1f2937;flex:1}
.back-btn{background:none;border:none;font-family:'Nunito',sans-serif;font-weight:700;font-size:15px;color:var(--indigo);cursor:pointer;padding:4px}

/* Tab bar */
.tab-bar{background:#fff;border-bottom:1px solid #e5e7eb;display:flex;overflow-x:auto;gap:8px;padding:8px 12px;scrollbar-width:none}
.tab-bar::-webkit-scrollbar{display:none}
.tab{border:none;border-radius:20px;padding:6px 16px;font-family:'Nunito',sans-serif;font-weight:700;font-size:14px;cursor:pointer;white-space:nowrap;background:#f3f4f6;color:#374151}
.tab.active{background:var(--indigo);color:#fff}

/* List items */
.list-item{display:flex;align-items:center;gap:12px;background:#fff;border-radius:14px;padding:14px;margin-bottom:10px}
.list-emoji{font-size:28px}
.list-name{font-weight:800;font-size:16px;color:#1f2937}
.list-sub{font-weight:400;font-size:13px;color:#6b7280;margin-top:2px}
.remove-btn{background:none;border:none;font-size:16px;color:#ef4444;cursor:pointer;padding:8px;font-weight:700}

/* Chips */
.chip{display:inline-flex;align-items:center;padding:8px 12px;border-radius:12px;background:#eef2ff;border:1px solid #c7d2fe;font-family:'Nunito',sans-serif;font-weight:700;font-size:13px;color:#4338ca;cursor:pointer;margin:0 4px 6px 0}
.chip.active{background:#c7d2fe}

/* Assign pills */
.pill{border:2px solid #e5e7eb;border-radius:20px;padding:6px 12px;font-family:'Nunito',sans-serif;font-weight:700;font-size:13px;color:#374151;cursor:pointer;background:#f9fafb;white-space:nowrap}
.pill.active{border-color:var(--indigo);background:#eef2ff;color:var(--indigo)}

/* Section title */
.section-title{font-weight:900;font-size:18px;color:#1f2937;margin:16px 0 10px}

/* Empty */
.empty-text{font-weight:700;font-size:15px;color:#9ca3af;text-align:center;padding:24px}

/* Spinner */
.spinner{display:flex;align-items:center;justify-content:center;height:100%;font-size:32px;animation:spin 1s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* Modal overlay */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);display:flex;align-items:flex-end;z-index:100}
.modal-card{background:#fff;border-radius:28px 28px 0 0;padding:24px;padding-bottom:calc(var(--safe-bottom)+24px);width:100%;max-height:90vh;overflow-y:auto}

/* Star bars */
.star-bar{height:10px;background:#e5e7eb;border-radius:5px;overflow:hidden;margin-top:6px}
.star-bar-fill{height:100%;border-radius:5px}

/* Chore row */
.chore-row{border-radius:16px;margin-bottom:12px;overflow:hidden}
.chore-main{display:flex;align-items:center;padding:14px;cursor:pointer;gap:14px}
.chore-icon{width:48px;height:48px;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:26px;flex-shrink:0}
.chore-name{font-weight:800;font-size:16px;color:#1f2937}
.chore-name.done{text-decoration:line-through;color:#9ca3af}
.chore-stars{font-weight:700;font-size:13px;color:#6b7280;margin-top:2px}
.checkbox{width:32px;height:32px;border-radius:10px;border:2.5px solid #d1d5db;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-left:auto}
.checkbox.checked{background:var(--check-color,#10b981);border-color:var(--check-color,#10b981);color:#fff;font-size:18px;font-weight:900}

/* Progress bar */
.progress-bar{height:12px;background:#e5e7eb;border-radius:6px;overflow:hidden;margin:6px 0 16px}
.progress-fill{height:100%;border-radius:6px;transition:width .3s}

/* Child card grid */
.card-grid{display:flex;flex-wrap:wrap;gap:16px;justify-content:center;margin-bottom:24px}
.child-card{width:155px;border-radius:24px;padding:20px;display:flex;flex-direction:column;align-items:center;cursor:pointer;box-shadow:0 6px 0 var(--shadow-color);transition:transform .1s,box-shadow .1s;border:none;font-family:'Nunito',sans-serif;position:relative}
.child-card:active{transform:translateY(4px);box-shadow:0 2px 0 var(--shadow-color)}
.child-card-emoji{font-size:52px;margin-bottom:6px}
.child-card-name{font-weight:900;font-size:20px;color:#fff;text-align:center}
.child-card-age{font-weight:700;font-size:13px;color:rgba(255,255,255,.8);margin-top:2px}
.child-card-stars{font-weight:800;font-size:15px;color:#fff;margin-top:10px}
.child-card-progress{font-weight:700;font-size:13px;color:rgba(255,255,255,.85)}
.all-done-badge{position:absolute;top:-8px;background:#fff;border-radius:12px;padding:2px 8px;font-weight:800;font-size:11px;color:#7c3aed}

/* Reward cards */
.reward-card{background:#fff;border-radius:16px;padding:14px;display:flex;flex-direction:column;align-items:center;border:2px solid #e5e7eb;cursor:pointer;min-width:110px}
.reward-card.disabled{opacity:.4;pointer-events:none}

/* Mode buttons */
.mode-btn{flex:1;border:2px solid #e5e7eb;border-radius:12px;padding:12px;font-family:'Nunito',sans-serif;font-weight:800;font-size:15px;cursor:pointer;background:#fff;color:#374151}
.mode-btn.deduct{background:#ef4444;border-color:#ef4444;color:#fff}
.mode-btn.bonus{background:#10b981;border-color:#10b981;color:#fff}

/* Request card */
.request-card{background:#fff;border-radius:14px;padding:14px;margin-bottom:10px;border-left:4px solid #f59e0b}
.request-card.approved{border-left-color:#10b981}
.request-card.rejected{border-left-color:#ef4444}

/* Adj row */
.adj-row{display:flex;align-items:center;background:#fff;border-radius:12px;padding:14px;margin-bottom:8px;border-left:4px solid #e5e7eb;gap:12px}

/* Stars row */
.stars-row{display:flex;gap:8px;margin-bottom:12px}
.star-btn{flex:1;border:2px solid #e5e7eb;border-radius:10px;padding:8px;font-family:'Nunito',sans-serif;font-weight:700;font-size:13px;cursor:pointer;background:#fff}
.star-btn.active{border-color:var(--indigo);background:#eef2ff}

/* Week nav */
.week-nav{display:flex;align-items:center;justify-content:space-between;background:#fff;border-radius:16px;padding:16px;margin-bottom:16px}
.week-nav-btn{background:none;border:none;font-size:20px;color:var(--indigo);cursor:pointer;font-weight:800;padding:8px}
</style>
</head>
